<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shruthi Book Shop - Pencils</title>
    <link rel="stylesheet" href="basic.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a class="logo" href="basic.html"><span>S</span>Shruthi Book Shop</a>
            <div class="nav-links">
                <a href="basic.html">Home</a>
                <a href="books.html">Books</a>
                <a href="pens.html">Pens</a>
                <a href="pencils.html">Pencils</a>
                <a href="bags.html">Bags</a>
                <a href="toys.html">Toys</a>
            </div>
        </nav>
    </header>

    <main class="products-page">
        <div class="page-heading">
            <div>
                <p class="small-title">Pencils section</p>
                <h1>Pencils</h1>
                <p>Shop pencils for writing, drawing, and coloring.</p>
            </div>
            <a class="secondary-button" href="basic.html#sections">Back to sections</a>
        </div>

        <div class="shop-layout">
            <div id="productGrid" class="product-grid"></div>
            <aside class="cart">
                <div class="cart-title">
                    <h2>Your Cart</h2>
                    <span id="cartCount">0</span>
                </div>
                <div id="cartItems" class="cart-items"></div>
                <div class="cart-total">
                    <span>Total</span>
                    <strong id="cartTotal">Rs. 0</strong>
                </div>
                <button id="checkoutButton" class="primary-button full-button" type="button">Checkout</button>
                <div id="scannerBox" class="scanner-box" hidden>
                    <p>Scan and pay</p>
                    <div class="qr-code" aria-label="Payment scanner code">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                    <strong id="scannerAmount">Total: Rs. 0</strong>
                </div>
                <p id="message" class="message" role="status"></p>
            </aside>
        </div>
    </main>

    <footer class="footer"><p>Shruthi Book Shop - Pencils section.</p></footer>

    <script>
        window.sectionProducts = [
    { id: 301, name: 'HB Pencil Pack', category: 'pencils', price: 40, stock: 15, detail: 'Pencils for writing and drawing.', letter: 'H' },
    { id: 302, name: 'Color Pencils', category: 'pencils', price: 95, stock: 8, detail: 'Bright colors for art and projects.', letter: 'C' },
    { id: 303, name: 'Mechanical Pencil', category: 'pencils', price: 55, stock: 0, detail: 'Reusable pencil with fine lines.', letter: 'M' },
    { id: 304, name: 'Drawing Pencil Set', category: 'pencils', price: 130, stock: 5, detail: 'Different shades for sketching.', letter: 'D' },
    { id: 305, name: 'Jumbo Pencil', category: 'pencils', price: 30, stock: 10, detail: 'Easy grip pencil for young students.', letter: 'J' }
];
    </script>
    <script src="category.js"></script>
</body>
</html>
