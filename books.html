<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shruthi Book Shop - Books</title>
    <link rel="stylesheet" href="basic.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a class="logo" href="basic.html"><span>S</span>Shruthi Book Shop</a>
            <div class="nav-links">
                <a href="basic.html">Home</a>
                <a href="books.html">Books</a>
                <a href="pens.html">Pens</a>
                <a href="pencils.html">Pencils</a>
                <a href="bags.html">Bags</a>
                <a href="toys.html">Toys</a>
            </div>
        </nav>
    </header>

    <main class="products-page">
        <div class="page-heading">
            <div>
                <p class="small-title">Books section</p>
                <h1>Books</h1>
                <p>Add books to cart and checkout with scanner.</p>
            </div>
            <a class="secondary-button" href="basic.html#sections">Back to sections</a>
        </div>

        <div class="shop-layout">
            <div id="productGrid" class="product-grid"></div>
            <aside class="cart">
                <div class="cart-title">
                    <h2>Your Cart</h2>
                    <span id="cartCount">0</span>
                </div>
                <div id="cartItems" class="cart-items"></div>
                <div class="cart-total">
                    <span>Total</span>
                    <strong id="cartTotal">Rs. 0</strong>
                </div>
                <button id="checkoutButton" class="primary-button full-button" type="button">Checkout</button>
                <div id="scannerBox" class="scanner-box" hidden>
                    <p>Scan and pay</p>
                    <div class="qr-code" aria-label="Payment scanner code">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                    <strong id="scannerAmount">Total: Rs. 0</strong>
                </div>
                <p id="message" class="message" role="status"></p>
            </aside>
        </div>
    </main>

    <footer class="footer"><p>Shruthi Book Shop - Books section.</p></footer>

    <script>
        window.sectionProducts = [
    { id: 101, name: 'Story Book', category: 'books', price: 180, stock: 8, detail: 'Fun reading book for children.', letter: 'S' },
    { id: 102, name: 'Notebook Pack', category: 'books', price: 120, stock: 12, detail: 'Ruled notebooks for school notes.', letter: 'N' },
    { id: 103, name: 'Exam Guide', category: 'books', price: 260, stock: 5, detail: 'Guide book for revision and practice.', letter: 'G' },
    { id: 104, name: 'Drawing Book', category: 'books', price: 70, stock: 0, detail: 'Blank pages for sketching and art.', letter: 'D' },
    { id: 105, name: 'Math Practice Book', category: 'books', price: 140, stock: 7, detail: 'Practice sums for daily learning.', letter: 'M' }
];
    </script>
    <script src="category.js"></script>
</body>
</html>
